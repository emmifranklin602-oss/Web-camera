<!DOCTYPE html>
<html>
<head>
  <title>Secure Cloud Camera Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1c1c1c, #111);
      color: #fff;
      text-align: center;
    }

    h2 {
      margin: 15px 0;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      max-width: 400px;
      margin: 15px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    input {
      width: 85%;
      max-width: 280px;
      padding: 12px;
      margin: 6px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    button {
      width: 85%;
      max-width: 280px;
      padding: 12px;
      margin: 6px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: #00c853;
    }

    button:active {
      transform: scale(0.98);
    }

    video {
      width: 100%;
      max-width: 350px;
      border-radius: 10px;
      margin-top: 10px;
      background: black;
    }

    .status {
      font-size: 13px;
      color: #aaa;
      margin-top: 5px;
    }

    .gallery video {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2 id="title">📹 Secure Cloud Camera</h2>

<div id="auth" class="card">
  <input id="email" placeholder="Email"><br>
  <input id="pin" placeholder="PIN"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" class="card" style="display:none;">
  <video id="preview" autoplay playsinline></video>

  <button onclick="startRecording()">Start Recording</button>
  <button onclick="stopRecording()">Stop</button>
  <button onclick="upload()">Upload</button>

  <div class="status" id="status"></div>

  <h3>Your Videos</h3>
  <div id="videos" class="gallery"></div>
</div>

<script>
const SUPABASE_URL = "https://czqxzvbggafuwedycdfm.supabase.co";
const SUPABASE_KEY = "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mediaRecorder;
let chunks = [];

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function login() {
  let email = document.getElementById("email").value;
  let pin = document.getElementById("pin").value;

  if(email && pin) {
    localStorage.setItem("user", email);
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("title").innerText = "📹 " + email;

    startCamera();
    loadVideos();
  }
}

async function startCamera() {
  let stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("preview").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) {
      chunks.push(e.data);
    }
  };
}

function startRecording() {
  chunks = [];
  mediaRecorder.start();
  setStatus("🎥 Recording...");
}

function stopRecording() {
  mediaRecorder.stop();
  setStatus("⏹ Recording stopped");
}

async function upload() {
  if (chunks.length === 0) {
    alert("No video recorded");
    return;
  }

  let blob = new Blob(chunks, { type: "video/webm" });
  let url = URL.createObjectURL(blob);

  // Save locally
  let videos = JSON.parse(localStorage.getItem("videos") || "[]");
  videos.push(url);
  localStorage.setItem("videos", JSON.stringify(videos));

  loadVideos();

  setStatus("☁️ Uploading...");

  const email = localStorage.getItem("user") || "user";
  const fileName = email + "_" + Date.now() + ".webm";

  const { error } = await supabase.storage
    .from('videos')
    .upload(fileName, blob);

  if (error) {
    setStatus("❌ Upload failed");
    console.error(error);
  } else {
    setStatus("✅ Uploaded to cloud");
  }
}

function loadVideos() {
  let videos = JSON.parse(localStorage.getItem("videos") || "[]");
  let container = document.getElementById("videos");
  container.innerHTML = "";

  videos.forEach(v => {
    let vid = document.createElement("video");
    vid.src = v;
    vid.controls = true;
    container.appendChild(vid);
  });
}

// Auto detect internet
window.addEventListener("online", () => {
  setStatus("📶 Back online");
});

window.addEventListener("offline", () => {
  setStatus("📴 Offline mode");
});
</script>

</body>
</html>
