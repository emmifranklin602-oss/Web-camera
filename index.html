<!DOCTYPE html>
<html>
<head>
  <title>Secure Cloud Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:black;color:white;text-align:center;margin-top:80px;font-family:sans-serif;">

<h1>Secure Cloud Camera</h1>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<div id="dash" style="display:none;">
  <h2>✅ Logged In</h2>

  <input type="file" id="fileInput"><br><br>
  <button onclick="uploadVideo()">Upload Video</button>

  <p id="uploadStatus"></p>

  <br>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://czqxzvbggafuwedycdfm.supabase.co",
  "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl"
);

function show(m,c="yellow"){msg.innerText=m;msg.style.color=c;}

async function signup(){
  show("Creating account...");
  const {error} = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  if(error) show(error.message,"red");
  else show("Account created. Now login.");
}

async function login(){
  show("Logging in...");
  const {error} = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if(error) show(error.message,"red");
  else{
    show("Login success");
    dash.style.display="block";
  }
}

async function uploadVideo(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){
    uploadStatus.innerText="Select a file first";
    return;
  }

  const fileName = Date.now() + "-" + file.name;

  const { error } = await supabase
    .storage
    .from("videos")
    .upload(fileName, file);

  if(error){
    uploadStatus.innerText = "❌ " + error.message;
  }else{
    uploadStatus.innerText = "✅ Upload successful!";
  }
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

supabase.auth.getSession().then(({data})=>{
  if(data.session) dash.style.display="block";
});
</script>

</body>
</html>
