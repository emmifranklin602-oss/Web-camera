<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Cloud Camera</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding-top: 40px;
}

input, button {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: white;
  color: black;
  font-weight: bold;
}

video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

#dashboard {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>📹 Secure Cloud Camera</h1>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<div id="dashboard">
<h2>Welcome 🎉</h2>

<video id="preview" autoplay muted></video>

<button onclick="startCamera()">Start Camera</button>
<button onclick="startRecording()">Start Recording</button>
<button onclick="stopRecording()">Stop Recording</button>

<button onclick="uploadSaved()">Upload Saved Videos</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>
</div>

</div>

<script>
const SUPABASE_URL = "https://czqxzvbggafuwedycdfm.supabase.co";
const SUPABASE_KEY = "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mediaRecorder;
let chunks = [];

// AUTH
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  document.getElementById("msg").innerText = error ? error.message : "Signup successful ✅";
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("auth").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// CAMERA
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("preview").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    chunks.push(e.data);
  };

  mediaRecorder.onstop = saveVideo;
}

// RECORD
function startRecording() {
  chunks = [];
  mediaRecorder.start();
  document.getElementById("status").innerText = "Recording...";
}

function stopRecording() {
  mediaRecorder.stop();
  document.getElementById("status").innerText = "Stopped";
}

// SAVE OFFLINE
function saveVideo() {
  const blob = new Blob(chunks, { type: "video/webm" });
  const reader = new FileReader();

  reader.onloadend = () => {
    let videos = JSON.parse(localStorage.getItem("videos") || "[]");
    videos.push(reader.result);
    localStorage.setItem("videos", JSON.stringify(videos));

    document.getElementById("status").innerText = "Saved offline ✅";

    autoUpload();
  };

  reader.readAsDataURL(blob);
}

// AUTO UPLOAD WHEN ONLINE
async function autoUpload() {
  if (navigator.onLine) {
    uploadSaved();
  } else {
    document.getElementById("status").innerText = "Offline - will upload later";
  }
}

// MANUAL UPLOAD
async function uploadSaved() {
  let videos = JSON.parse(localStorage.getItem("videos") || "[]");

  if (videos.length === 0) {
    document.getElementById("status").innerText = "No videos to upload";
    return;
  }

  for (let i = 0; i < videos.length; i++) {
    let blob = await (await fetch(videos[i])).blob();

    const fileName = "video_" + Date.now() + ".webm";

    const { error } = await supabase.storage
      .from("videos")
      .upload(fileName, blob);

    if (!error) {
      videos.splice(i, 1);
      i--;
    }
  }

  localStorage.setItem("videos", JSON.stringify(videos));
  document.getElementById("status").innerText = "Upload complete ✅";
}

// AUTO CHECK INTERNET
window.addEventListener("online", uploadSaved);
</script>

</body>
</html>
