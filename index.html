<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Cloud Camera</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: Arial;
}

.container {
  margin-top: 40px;
}

input, button {
  padding: 12px;
  margin: 8px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

button {
  background: #fff;
  cursor: pointer;
}

video {
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
  margin-top: 20px;
}

#recordBtn {
  background: red;
  color: white;
}

#uploadBtn {
  background: green;
  color: white;
}
</style>
</head>

<body>

<h1>📹 Secure Cloud Camera</h1>

<div id="auth" class="container">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<div id="app" class="container" style="display:none;">
  <h2>Welcome 🎉</h2>

  <video id="preview" autoplay muted></video><br>

  <button id="recordBtn" onclick="startRecording()">Start Recording</button>
  <button onclick="stopRecording()">Stop</button><br>

  <button id="uploadBtn" onclick="uploadVideo()">Upload</button>
  <button onclick="logout()">Logout</button>

  <p id="status"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://czqxzvbggafuwedycdfm.supabase.co",
  "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl"
);

let mediaRecorder;
let recordedChunks = [];
let videoBlob;

// AUTH
async function signup() {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  msg.innerText = error ? error.message : "Signup successful ✅";
}

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (error) {
    msg.innerText = error.message;
  } else {
    auth.style.display = "none";
    app.style.display = "block";
    startCamera();
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// CAMERA
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  preview.srcObject = stream;

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    videoBlob = new Blob(recordedChunks, { type: "video/webm" });
    localStorage.setItem("video", URL.createObjectURL(videoBlob)); // offline save
    status.innerText = "Saved locally ✅";
  };
}

function startRecording() {
  recordedChunks = [];
  mediaRecorder.start();
  status.innerText = "Recording...";
}

function stopRecording() {
  mediaRecorder.stop();
}

// UPLOAD
async function uploadVideo() {
  if (!videoBlob) {
    status.innerText = "No video recorded";
    return;
  }

  const fileName = `video_${Date.now()}.webm`;

  const { data, error } = await supabase.storage
    .from("videos")
    .upload(fileName, videoBlob);

  if (error) {
    status.innerText = "Upload failed ❌";
  } else {
    status.innerText = "Uploaded to cloud ☁️✅";
  }
}
</script>

</body>
</html>
