<!DOCTYPE html>
<html>
<head>
  <title>Secure Cloud Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:black;color:white;text-align:center;margin-top:100px;font-family:sans-serif;">

<h1>Secure Cloud Camera</h1>

<input id="email" placeholder="Email" style="padding:10px;margin:10px;"><br>
<input id="password" type="password" placeholder="Password" style="padding:10px;margin:10px;"><br>

<button onclick="signup()" style="padding:10px;background:#00ff99;">Sign Up</button>
<button onclick="login()" style="padding:10px;background:#00ff99;">Login</button>

<p id="msg"></p>

<div id="dash" style="display:none;">
  <h2>✅ Logged In Successfully</h2>
  <p>Your app is now connected 🔥</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://czqxzvbggafuwedycdfm.supabase.co",
  "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl"
);

function show(message, color="yellow") {
  const msg = document.getElementById("msg");
  msg.innerText = message;
  msg.style.color = color;
}

async function signup() {
  show("Creating account...");

  const { error } = await supabase.auth.signUp({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if (error) {
    show("❌ " + error.message, "red");
  } else {
    show("✅ Account created! Now click Login.");
  }
}

async function login() {
  show("Logging in...");

  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  });

  if (error) {
    show("❌ " + error.message, "red");
  } else {
    show("✅ Login successful!");
    document.getElementById("dash").style.display = "block";
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// auto login check
supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    document.getElementById("dash").style.display = "block";
  }
});
</script>

</body>
</html>
