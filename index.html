<!DOCTYPE html>
<html>
<head>
  <title>Secure Cloud Camera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h2>Secure Cloud Camera</h2>

<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>✅ Logged in successfully</h3>
  <button onclick="logout()">Logout</button>
</div>

<script>
const SUPABASE_URL = "https://czqxzvbggafuwedycdfm.supabase.co";
const SUPABASE_KEY = "sb_publishable_umr4deBhxvaiAFqUvcfdQw_q4G6HSRl";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* SIGN UP */
async function signUp() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) {
    alert(error.message);
  } else {
    alert("Account created!");
  }
}

/* LOGIN */
async function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    alert(error.message);
  } else {
    showApp();
  }
}

/* AUTO LOGIN */
window.onload = async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (user) {
    showApp();
  }
};

/* LOGOUT */
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}
</script>

</body>
</html>
